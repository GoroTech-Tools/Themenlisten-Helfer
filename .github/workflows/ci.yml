name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  smoke:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if (Test-Path src/requirements.txt) { pip install -r src/requirements.txt }
          elseif (Test-Path requirements.txt) { pip install -r requirements.txt }
        shell: pwsh

      - name: Syntax check
        run: |
          python -m py_compile src\ThemenlistenHelfer_GUI.py
        shell: pwsh
