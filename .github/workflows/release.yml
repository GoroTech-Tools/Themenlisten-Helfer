name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path src/requirements.txt) { pip install -r src/requirements.txt }
          elseif (Test-Path requirements.txt) { pip install -r requirements.txt }
          pip install pyinstaller

      - name: Derive version
        id: set_version
        shell: pwsh
        run: |
          if ("${{ github.ref }}".StartsWith("refs/tags/")) {
            $version = "${{ github.ref_name }}".TrimStart('v')
          }
          else {
            $version = (Get-Content "src/version.txt" -Raw).Trim()
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Guard tag matches src version
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tagName = "${{ github.ref_name }}"
          if ($tagName -notmatch '^v\d+\.\d+\.\d+$') {
            Write-Error "Invalid tag format '$tagName'. Expected semantic version tag format: vMAJOR.MINOR.PATCH (e.g., v2.4.5)."
            exit 1
          }

          $tagVersion = "${{ github.ref_name }}".TrimStart('v')
          $fileVersion = (Get-Content "src/version.txt" -Raw).Trim()

          if ($tagVersion -ne $fileVersion) {
            Write-Error "Version mismatch: Tag version '$tagVersion' != src/version.txt '$fileVersion'."
            exit 1
          }

          Write-Host "Version guard passed: $tagVersion"

      - name: Build executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          python -m PyInstaller src/ThemenlistenHelfer_GUI.spec

      - name: Package release assets
        shell: pwsh
        env:
          VERSION: ${{ steps.set_version.outputs.version }}
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null

          $exeName = "Themenlisten-Helfer_${env:VERSION}.exe"
          $zipName = "Themenlisten-Helfer_v${env:VERSION}.zip"
          $notesName = "RELEASE_NOTES_v${env:VERSION}.md"
          $notesPath = "release/$notesName"

          if (Test-Path "release/$zipName") { Remove-Item "release/$zipName" -Force }
          Compress-Archive -Path "dist/ThemenlistenHelfer.exe", "data", "output", "assets/images/Themenlistenhelfer.png", "src/version.txt", "README.md", "docs" -DestinationPath "release/$zipName"

          $notesLines = @(
            "# Release Notes v${env:VERSION}",
            "",
            "## Enthalten",
            "",
            "- Themenlisten-Helfer im Versionsstand ${env:VERSION}.",
            "- Release-Artefakte im Schema ``ThemenlistenHelfer.exe``, ``Themenlisten-Helfer_v<version>.zip`` und ``RELEASE_NOTES_v<version>.md``.",
            "- Dokumentation unter ``docs/`` sowie ergänzende GitHub Release Notes im Release-Eintrag.",
            "",
            "## Artefakte",
            "",
            "- ``dist/ThemenlistenHelfer.exe``",
            "- ``release/$zipName``",
            "- ``release/$notesName``",
            "",
            "## Hinweise",
            "",
            "- Empfohlenes Testartefakt: ``dist/ThemenlistenHelfer.exe``",
            "- Vollständiger Commit-Verlauf: ``https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}``"
          )
          Set-Content -Path $notesPath -Encoding utf8 -Value ($notesLines -join "`n")

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-v${{ steps.set_version.outputs.version }}
          path: |
            dist/ThemenlistenHelfer.exe
            release/Themenlisten-Helfer_v${{ steps.set_version.outputs.version }}.zip
            release/RELEASE_NOTES_v${{ steps.set_version.outputs.version }}.md

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Themenlisten-Helfer ${{ github.ref_name }}
          body_path: release/RELEASE_NOTES_v${{ steps.set_version.outputs.version }}.md
          generate_release_notes: false
          files: |
            dist/ThemenlistenHelfer.exe
            release/Themenlisten-Helfer_v${{ steps.set_version.outputs.version }}.zip
            release/RELEASE_NOTES_v${{ steps.set_version.outputs.version }}.md

      - name: Guardrail - normalize release titles
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $releases = gh release list --limit 100 --json tagName,name | ConvertFrom-Json
          foreach ($r in $releases) {
            if ($null -ne $r.name -and $r.name -match '^Release\s+') {
              $newTitle = "Themenlisten-Helfer $($r.tagName)"
              Write-Host "Guardrail: '$($r.name)' -> '$newTitle'"
              gh release edit $r.tagName --title $newTitle | Out-Null
            }
          }
