name: Bug Report
description: Fehler melden
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Danke für deinen Report! Bitte so konkret wie möglich ausfüllen."
  - type: textarea
    id: summary
    attributes:
      label: Fehlerbeschreibung
      description: Was ist passiert?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Schritte zum Reproduzieren
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Erwartetes Verhalten
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: z. B. 2.4.3
